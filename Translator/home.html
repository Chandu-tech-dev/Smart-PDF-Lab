<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Language Translator</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/0.27.2/axios.min.js"></script>
  <script src="https://unpkg.com/@khalyomede/translate@0.1.0/dist/index.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.9.179/pdf.min.js"></script>
</head>

<body>
  <div id="app-container">
    <header class="app-header">
      <a href="../index.html" class="back-link">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" <svg
          xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="19" y1="12" x2="5" y2="12"></line>
          <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
        Back to Home
      </a>
      <h1 style="margin-top: 50px;">Language Translator</h1>
      <h2 style="margin-top: 10px;">Extract text from PDFs and translate it instantly AI</h2>
    </header>

    <div class="tool-card">
      <div class="upload-zone" id="drop-zone">
        <input type="file" id="file-input" accept="application/pdf" hidden>
        <div class="icon-upload">📄</div>
        <h3>Drop PDF file here</h3>
        <p>or click to browse</p>
      </div>

      <div class="input-group">
        <div
          style="display: flex; gap: 1rem; align-items: center; flex-wrap: wrap; justify-content: center; width: 100%;">
          <label for="start-page">Pages:</label>
          <input type="number" id="start-page" min="1" value="1" style="width: 80px;" placeholder="Start" />
          <span>to</span>
          <input type="number" id="end-page" min="1" value="1" style="width: 80px;" placeholder="End" />
          <button id="extract-btn" disabled>
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
              <polyline points="14 2 14 8 20 8"></polyline>
              <line x1="16" y1="13" x2="8" y2="13"></line>
              <line x1="16" y1="17" x2="8" y2="17"></line>
              <polyline points="10 9 9 9 8 9"></polyline>
            </svg>
            Extract Text
          </button>
        </div>
      </div>

      <div class="translator-grid">
        <div class="text-area-wrapper">
          <div class="text-area-header">
            <label for="fromLang">Source Language</label>
            <select id="fromLang" style="width: 150px;">
              <option value="auto">Detect Auto</option>
              <option value="en">English</option>
              <option value="hi">Hindi</option>
              <option value="kn">Kannada</option>
              <option value="ta">Tamil</option>
              <option value="te">Telugu</option>
              <option value="ml">Malayalam</option>
              <option value="mr">Marathi</option>
              <option value="bn">Bengali</option>
              <option value="gu">Gujarati</option>
              <option value="ur">Urdu</option>
              <option value="fr">French</option>
              <option value="es">Spanish</option>
              <option value="de">German</option>
            </select>
          </div>
          <div id="inputText" class="output-div" aria-label="Extracted text will appear here..."></div>
        </div>

        <div class="text-area-wrapper">
          <div class="text-area-header">
            <label for="toLang">Target Language</label>
            <select id="toLang" style="width: 150px;">
              <option value="en">English</option>
              <option value="hi">Hindi</option>
              <option value="kn">Kannada</option>
              <option value="ta">Tamil</option>
              <option value="te">Telugu</option>
              <option value="ml">Malayalam</option>
              <option value="mr">Marathi</option>
              <option value="bn">Bengali</option>
              <option value="gu">Gujarati</option>
              <option value="fr">French</option>
              <option value="es">Spanish</option>
              <option value="de">German</option>
            </select>
          </div>
          <div id="outputText" class="output-div" aria-label="Translation will appear here..."></div>
        </div>
      </div>

      <div style="display: flex; justify-content: center; margin-bottom: 2rem;">
        <button id="translateBtn" disabled style="padding: 1rem 3rem; font-size: 1.2rem;">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"></circle>
            <line x1="2" y1="12" x2="22" y2="12"></line>
            <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>
          </svg>
          Translate Now
        </button>
      </div>

      <div class="input-group"
        style="margin-top: 1rem; border-top: 1px solid var(--glass-border); padding-top: 1.5rem;">
        <button onclick="copyText()" class="secondary-btn">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
          </svg>
          Copy Result
        </button>
        <button onclick="clearText()" class="secondary-btn"
          style="color: #ef4444; border-color: rgba(239, 68, 68, 0.3);">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 6 5 6 21 6"></polyline>
            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
            <line x1="10" y1="11" x2="10" y2="17"></line>
            <line x1="14" y1="11" x2="14" y2="17"></line>
          </svg>
          Clear All
        </button>
      </div>
    </div>

    <footer>
      <p>Developed by Saarika 💗 and Groups</p>
    </footer>
  </div>
  <script src="script.js"></script>
</body>

</html>
