<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Language Translator</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.9.179/pdf.min.js"></script>
</head>

<body>
  <div id="app-container">
    <header class="app-header">
      <a href="../index.html" class="back-link">← Back to Home</a>
      <h1>Language Translator</h1>
    </header>

    <!-- Upload Zone -->
    <div class="upload-zone" id="drop-zone">
      <input type="file" id="file-input" accept="application/pdf" hidden />
      <div class="icon-upload">🌐</div>
      <h3>Drop PDF file here</h3>
      <p>or click to browse</p>
    </div>

    <!-- Page range notice -->
    <p class="notice">⚠️ Specify the page range <strong>before</strong> choosing a PDF</p>

    <!-- Page Selection Row -->
    <div class="controls-row" id="page-selection-row">
      <div class="control-group">
        <label for="start-page">Start Page:</label>
        <input type="number" id="start-page" min="1" value="1" />
      </div>
      <div class="control-group">
        <label for="end-page">End Page:</label>
        <input type="number" id="end-page" min="1" value="1" />
      </div>
    </div>

    <!-- Extracted Text -->
    <div id="inputText" contenteditable="true" aria-label="Extracted text will appear here"
      placeholder="Extracted PDF text will appear here… or type/paste text directly."></div>

    <!-- Language Selection Row -->
    <div class="controls-row" id="lang-selection-row">
      <div class="control-group">
        <label for="fromLang">From:</label>
        <select id="fromLang">
          <option value="auto">Detect Language</option>
          <option value="en">English</option>
          <option value="hi">Hindi</option>
          <option value="kn">Kannada</option>
          <option value="ta">Tamil</option>
          <option value="te">Telugu</option>
          <option value="ml">Malayalam</option>
          <option value="mr">Marathi</option>
          <option value="bn">Bengali</option>
          <option value="gu">Gujarati</option>
          <option value="ur">Urdu</option>
          <option value="fr">French</option>
          <option value="es">Spanish</option>
          <option value="de">German</option>
          <option value="it">Italian</option>
          <option value="pt">Portuguese</option>
          <option value="ar">Arabic</option>
          <option value="zh-CN">Chinese (Simplified)</option>
          <option value="ja">Japanese</option>
          <option value="ko">Korean</option>
          <option value="ru">Russian</option>
        </select>
      </div>

      <div class="control-group">
        <label for="toLang">To:</label>
        <select id="toLang">
          <option value="en">English</option>
          <option value="hi">Hindi</option>
          <option value="kn">Kannada</option>
          <option value="ta">Tamil</option>
          <option value="te">Telugu</option>
          <option value="ml">Malayalam</option>
          <option value="mr">Marathi</option>
          <option value="bn">Bengali</option>
          <option value="gu">Gujarati</option>
          <option value="ur">Urdu</option>
          <option value="fr">French</option>
          <option value="es">Spanish</option>
          <option value="de">German</option>
          <option value="it">Italian</option>
          <option value="pt">Portuguese</option>
          <option value="ar">Arabic</option>
          <option value="zh-CN">Chinese (Simplified)</option>
          <option value="ja">Japanese</option>
          <option value="ko">Korean</option>
          <option value="ru">Russian</option>
        </select>
      </div>
    </div>

    <button id="translateBtn">Translate</button>
    <div id="status-msg"></div>
    <div id="outputText" aria-label="Translated text will appear here"></div>

    <div class="button-group">
      <button onclick="copyText()">Copy</button>
      <button onclick="clearText()">Clear</button>
    </div>

    <footer>
      <p style="text-align: center; font-size: 20px;">Developed by Saarika and Groups</p>
    </footer>
  </div>

  <script>
    // ── Translation using MyMemory free API (no key required, browser-safe) ──
    async function doTranslate(text, fromLang, toLang) {
      // MyMemory expects "en|hi" format; "auto" is handled by sending just the target
      const langPair = (fromLang === "auto") ? `en|${toLang}` : `${fromLang}|${toLang}`;
      const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${langPair}`;
      const resp = await fetch(url);
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const data = await resp.json();
      if (data.responseStatus !== 200) throw new Error(data.responseDetails || "Translation failed");
      return data.responseData.translatedText;
    }

    // ── Translate button ──
    document.getElementById('translateBtn').addEventListener('click', async () => {
      const text = document.getElementById('inputText').innerText.trim();
      const fromLang = document.getElementById('fromLang').value;
      const toLang = document.getElementById('toLang').value;
      const statusMsg = document.getElementById('status-msg');

      if (!text) {
        alert("Please extract a PDF or type/paste some text first.");
        return;
      }

      if (fromLang !== "auto" && fromLang === toLang) {
        alert("Source and target languages are the same. Please choose different languages.");
        return;
      }

      const btn = document.getElementById('translateBtn');
      btn.disabled = true;
      btn.textContent = "Translating…";
      statusMsg.textContent = "";
      document.getElementById('outputText').innerText = "";

      try {
        // MyMemory free tier limit: 500 chars per request — chunk if needed
        const CHUNK_SIZE = 450;
        const words = text.split(' ');
        let chunks = [];
        let current = '';

        for (const word of words) {
          if ((current + ' ' + word).trim().length > CHUNK_SIZE) {
            if (current) chunks.push(current.trim());
            current = word;
          } else {
            current = current ? current + ' ' + word : word;
          }
        }
        if (current) chunks.push(current.trim());

        let translated = '';
        for (let i = 0; i < chunks.length; i++) {
          statusMsg.textContent = `Translating chunk ${i + 1} of ${chunks.length}…`;
          const part = await doTranslate(chunks[i], fromLang, toLang);
          translated += (translated ? ' ' : '') + part;
        }

        document.getElementById('outputText').innerText = translated;
        statusMsg.textContent = "✅ Translation complete!";
      } catch (error) {
        console.error(error);
        statusMsg.textContent = "❌ Translation failed. Check your internet connection.";
      } finally {
        btn.disabled = false;
        btn.textContent = "Translate";
      }
    });

    // ── Copy translated text ──
    function copyText() {
      const output = document.getElementById('outputText');
      if (!output.innerText.trim()) {
        alert("Nothing to copy.");
        return;
      }
      navigator.clipboard.writeText(output.innerText).then(() => {
        alert("Translated text copied!");
      }).catch(() => {
        // Fallback
        const range = document.createRange();
        range.selectNodeContents(output);
        const selection = window.getSelection();
        selection.removeAllRanges();
        selection.addRange(range);
        document.execCommand("copy");
        alert("Translated text copied!");
      });
    }

    // ── Clear all text ──
    function clearText() {
      document.getElementById('inputText').innerText = "";
      document.getElementById('outputText').innerText = "";
      document.getElementById('status-msg').textContent = "";
    }
  </script>
  <script src="script.js"></script>
</body>

</html>
