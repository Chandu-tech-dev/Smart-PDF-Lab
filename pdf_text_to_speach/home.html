<!DOCTYPE html>
<!-- path: pdf_text_to_speach/home.html -->
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PDF Text to Speech | Smart PDF Lab</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <div class="glow-orb glow-1"></div>
    <div class="glow-orb glow-2"></div>

    <div class="app-container">
        <header class="app-header">
            <a href="../index.html" class="back-link">← Back to Home</a>
            <h1>PDF Text to Speech</h1>
            <h3>Upload a PDF, select pages, and listen to the content with natural voices.</h3>
        </header>

        <main class="tool-card">
            <div class="upload-zone" id="drop-zone">
                <input type="file" id="file-input" accept="application/pdf" hidden />
                <div class="icon-upload">🎧</div>
                <h3>Drop PDF file here</h3>
                <p>or click to browse</p>
            </div>

            <div class="input-group">
                <div id="page-selection" style="display: flex; gap: 20px; align-items: center;">
                    <div>
                        <label for="start-page">Start Page:</label>
                        <input type="number" id="start-page" min="1" value="1" />
                    </div>
                    <div>
                        <label for="end-page">End Page:</label>
                        <input type="number" id="end-page" min="1" value="1" />
                    </div>
                </div>
            </div>

            <div class="input-group">
                <label for="voice-select">Select Voice:</label>
                <select id="voice-select"></select>
            </div>

            <div id="text-content" aria-label="Extracted text from PDF">
                <p style="text-align: center; color: var(--text-muted);">Extracted text will appear here...</p>
            </div>

            <div id="controls">
                <button id="play-btn" disabled>Play Speech</button>
                <button id="pause-btn" disabled>Pause</button>
                <button id="resume-btn" disabled>Resume</button>
                <button id="cancel-btn" disabled>Cancel</button>
            </div>
        </main>

        <footer>
            <p>Developed by Saarika and Groups</p>
        </footer>
    </div>

    <!-- pdf.js library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.9.179/pdf.min.js"></script>
    <script>
        // Set worker globally if consistent path needed, 
        // usually defined in script.js but ensuring compatibility
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.9.179/pdf.worker.min.js';
    </script>
    <script src="script.js"></script>
</body>

</html>
